name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cortex-tools/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: cortex-tools

      - name: Build (production)
        run: npm run build:prod
        working-directory: cortex-tools

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cortex-tools/dist/cortex-tools.user.js
            cortex-tools/dist/cortex-tools.meta.js
          generate_release_notes: true
